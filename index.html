<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Howard Huang | From Life To Lines</title>
    <style>
        /* 基礎全螢幕深色美學設定 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        /* 頂部大頭貼與品牌區塊 */
        .profile-container {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 25px;
            position: relative;
            z-index: 10;
        }
        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            object-fit: contain;
            background-color: #fff;
        }
        .brand-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 15px 0 5px 0;
            letter-spacing: 2px;
        }
        .bio-text {
            font-size: 0.9rem;
            color: #888;
            margin: 0;
        }
        /* 連結按鈕區塊 */
        .links-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            z-index: 10;
        }
        .link-btn {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 72px;
            box-sizing: border-box;
            text-decoration: none;
            background-color: rgba(30,30,30,0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            padding: 12px 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 1rem;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
        }
        .link-btn:hover {
            background-color: rgba(45,45,45,0.7);
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .link-btn:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }
        /* 針對主打工具(計算機)的特殊視覺強化 */
        .highlight-btn {
            background: linear-gradient(135deg, rgba(44,44,44,0.7), rgba(26,26,26,0.7));
            border: 1px solid rgba(255,71,87,0.5);
        }
        .highlight-btn:hover {
            background: linear-gradient(135deg, rgba(55,55,55,0.8), rgba(33,33,33,0.8));
            border-color: rgba(255,71,87,0.8);
        }
        .highlight-btn::before {
            content: '🔥 熱門工具';
            position: absolute;
            top: -10px;
            right: 10px;
            background-color: #ff4757;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
        }
        /* 隱藏流體模擬的控制面板 */
        .dg.ac {
            display: none !important;
        }
    </style>
    <!-- Fluid Simulation Dependency -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
</head>
<body>
    <canvas style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0;"></canvas>

    <div class="profile-container">
        <img src="logo.png" alt="From Life To Lines" class="profile-pic">
        <h1 class="brand-name">生活線條</h1>
        <p class="bio-text">用數據驅動設計，打造高轉換視覺護城河</p>
    </div>

    <div class="links-container">
        <a href="https://fromlifetolines.github.io/ad-roi-calculator/" class="link-btn highlight-btn" target="_blank">
            👉 算算看：你的廣告是在賺錢還是燒錢？<br><span style="font-size: 0.8rem; color: #aaa;">(隱形虧損計算機)</span>
        </a>

        <a href="https://www.instagram.com/fromlifetolines/" class="link-btn" target="_blank">
            ✨ 品牌升級：打造高轉換率視覺護城河<br><span style="font-size: 0.8rem; color: #aaa;">(Instagram 官方帳號)</span>
        </a>

        <a href="https://line.me/R/ti/p/@242lqfuy?ts=10171235&oat_content=url" class="link-btn" target="_blank">
            💬 官方 LINE：一對一諮詢服務
        </a>

        <a href="https://fromlifetolines.github.io/FromLifeToLines/" class="link-btn" target="_blank">
            📩 立即預約：免費品牌視覺與 ROI 健檢
        </a>
    </div>

    <!-- 避免流體特效腳本當機的隱藏元素 -->
    <div class="promo" style="display:none"></div>
    <div class="promo-close" style="display:none"></div>
    <div id="apple_link" style="display:none"></div>
    <div id="google_link" style="display:none"></div>

    <!-- 避免流體特效腳本因缺少 Google Analytics 而當機 -->
    <script>
        window.ga = window.ga || function(){};
    </script>
    <script src="script.js"></script>
</body>
</html>
